                        <h2 class="text-3xl font-bold text-m-text mb-6">我是歷史大聰明</h2>
                        <div class="text-left text-m-secondary space-y-4 mb-8 text-lg">
                            <p>歡迎來到 B3L15 複習挑戰！這裡有三個大題等你完成：</p>
                            <ul class="list-disc list-inside pl-4 space-y-2">
                                <li><b>第一大題：</b> 生詞選擇題 (20題)</li>
                                <li><b>第二大題：</b> 生詞填空題 (三篇)</li>
                                <li><b>第三大題：</b> 語法排序拼接 (4個語法)</li>
                            </ul>
                            <div class="bg-m-bg p-4 rounded-xl mt-6 border border-m-light">
                                <p class="font-bold text-m-text mb-2">🧩 拼圖生命值規則：</p>
                                <p class="text-sm">每個大題開始時，你會有 <b class="text-m-primary">6 個小拼圖 (機會)</b>。答錯會扣除一個。</p>
                                <p class="text-sm mt-1">如果 6 個機會都用完 (沒有小拼圖了)，那個大題就會 <b class="text-m-error">重新開始</b>！</p>
                                <p class="text-xs mt-1 text-m-secondary">(第三大題則是每個語法重新計算)。</p>
                            </div>
                        </div>
                        <button onclick="startStage1()" class="btn-hover bg-m-primary hover:bg-m-secondary transition-colors text-white text-xl font-bold py-4 px-12 rounded-full shadow-[0_6px_0_#8C7A6B]">開始挑戰</button>
                    </div>
                `;
            } 
            else if (state.stage === 1) {
                document.getElementById('header-subtitle').innerText = "- 第一大題：選擇題";
                let q = part1Data[state.part1Index];
                
                let optionsHtml = q.options.map((opt, i) => `
                    <button onclick="handlePart1Ans(${i})" class="btn-hover w-full bg-white border-2 border-m-light hover:border-m-primary text-m-text font-bold py-4 px-6 rounded-2xl text-left text-lg flex items-center transition-colors">
                        <span class="bg-m-bg text-m-primary w-8 h-8 rounded-full flex justify-center items-center mr-4 font-bold">${String.fromCharCode(65+i)}</span>
                        ${opt}
                    </button>
                `).join('');

                app.innerHTML = `
                    <div class="w-full max-w-2xl">
                        <div class="flex justify-between items-center mb-4 text-m-secondary font-semibold">
                            <span>第一大題 (${state.part1Index + 1}/${part1Data.length})</span>
                        </div>
                        <div class="bg-m-card p-6 md:p-8 rounded-3xl shadow-sm mb-6 border-l-4 border-m-primary">
                            <p class="text-xl md:text-2xl leading-relaxed font-bold text-m-text">${q.q}</p>
                        </div>
                        <div class="space-y-4">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            }
            else if (state.stage === 2) {
                document.getElementById('header-subtitle').innerText = "- 第二大題：生詞填空";
                let article = part2Data[state.part2Index];
                
                let textHtml = article.text;
                for(let i=1; i<=10; i++) {
                    let blankVal = state.p2Blanks[i-1];
                    let spanHtml = blankVal 
                        ? `<span class="blank-slot filled" onclick="returnWord(${i-1})">${blankVal}</span>` 
                        : `<span class="blank-slot">(${i})</span>`;
                    textHtml = textHtml.replace(`[${i}]`, spanHtml);
                }

                let wordsHtml = state.p2AvailableWords.map((w, i) => {
                    let isUsed = state.p2Blanks.includes(w);
                    return `<button class="word-bank-btn ${isUsed ? 'used' : ''}" onclick="useWord('${w}')">${w}</button>`;
                }).join('');

                app.innerHTML = `
                    <div class="w-full max-w-3xl flex flex-col h-full">
                        <div class="flex justify-between items-center mb-4 text-m-secondary font-semibold">
                            <span>第二大題 - 篇章 ${state.part2Index + 1}/3</span>
                        </div>
                        <div class="bg-m-card p-6 md:p-8 rounded-3xl shadow-sm mb-6 flex-grow border-l-4 border-m-primary text-lg md:text-xl leading-loose">
                            ${textHtml}
                        </div>
                        
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-m-light relative">
                            <p class="text-sm text-m-secondary font-bold mb-3">請點擊下方生詞填入空格 (點擊空格可撤回)：</p>
                            <div class="flex flex-wrap gap-2 justify-center min-h-[100px]">
                                ${wordsHtml}
                            </div>
                            <div class="mt-6 text-center">
                                <button onclick="checkPart2()" class="btn-hover bg-m-success hover:bg-[#688a70] transition-colors text-white font-bold py-3 px-10 rounded-full shadow-[0_4px_0_#5f7a67] text-lg">送出答案</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (state.stage === 3) {
                let curGrammar = part3Data[state.part3GrammarIndex];
                let qLength = curGrammar.qs.length;
                document.getElementById('header-subtitle').innerText = `- 第三大題：語法 (${curGrammar.grammar})`;
                
                let poolHtml = state.p3Pool.map((frag, i) => 
                    `<button class="chunk-btn hover:border-m-primary" onclick="p3MoveToAns(${i})">${frag}</button>`
                ).join('');
                
                let ansHtml = state.p3Answer.map((frag, i) => 
                    `<button class="chunk-btn bg-m-light border-m-primary shadow-none" onclick="p3MoveToPool(${i})">${frag}</button>`
                ).join('');

                app.innerHTML = `
                    <div class="w-full max-w-3xl">
                        <div class="flex justify-between items-center mb-4 text-m-secondary font-semibold">
                            <span>語法：${curGrammar.grammar} (${state.part3QuestionIndex + 1}/${qLength})</span>
                            <span class="text-xs bg-m-bg px-2 py-1 rounded">此題錯誤次數: ${state.part3Mistakes}/3</span>
                        </div>
                        
                        <div class="bg-m-card p-6 rounded-3xl shadow-sm min-h-[120px] flex flex-wrap content-start gap-2 border-2 border-dashed border-m-primary mb-6 relative transition-all">
                            ${state.p3Answer.length === 0 ? '<span class="text-m-light absolute top-6 left-6 select-none font-semibold">請點擊下方詞塊依序組合句子...</span>' : ansHtml}
                        </div>

                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-m-light">
                            <div class="flex flex-wrap gap-3 justify-center min-h-[100px]">
                                ${poolHtml}
                            </div>
                            <div class="mt-8 text-center">
                                <button onclick="checkPart3()" class="btn-hover bg-m-success hover:bg-[#688a70] transition-colors text-white font-bold py-3 px-10 rounded-full shadow-[0_4px_0_#5f7a67] text-lg">確認句子</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (state.stage === 4) {
                document.getElementById('header-subtitle').innerText = "挑戰完成！";
                app.innerHTML = `
                    <div class="bg-m-card p-8 rounded-3xl shadow-lg text-center w-full max-w-lg border-t-4 border-m-success">
                        <div class="text-6xl mb-4">🏆</div>
                        <h2 class="text-3xl font-bold text-m-text mb-4">恭喜你完成所有挑戰！</h2>
                        <p class="text-m-secondary text-lg mb-8">你真的是歷史大聰明，B3L15 的生詞跟語法都難不倒你！</p>
                        <button onclick="location.reload()" class="btn-hover bg-m-primary hover:bg-m-secondary transition-colors text-white text-xl font-bold py-3 px-10 rounded-full shadow-[0_4px_0_#8C7A6B]">再玩一次</button>
                    </div>
                `;
            }
        }

        function startStage1() {
            state.stage = 1;
            state.lives = 6;
            state.part1Index = 0;
            render();
        }

        function handlePart1Ans(idx) {
            let q = part1Data[state.part1Index];
            if (idx === q.ans) {
                state.part1Index++;
                if (state.part1Index >= part1Data.length) {
                    showModal("太棒了！", "第一大題全部答對，準備進入第二大題！", startStage2);
                } else {
                    render();
                }
            } else {
                let resetTriggered = loseLife("第一大題", startStage1);
                if (!resetTriggered) {
                    showModal("答錯囉！", `提示：${q.hint}`);
                }
            }
        }

        function startStage2() {
            state.stage = 2;
            state.lives = 6;
            state.part2Index = 0;
            initPart2Article();
        }

        function initPart2Article() {
            let article = part2Data[state.part2Index];
            state.p2Blanks = Array(10).fill(null);
            state.p2AvailableWords = shuffle([...article.words]);
            render();
        }

        function useWord(w) {
            let emptyIdx = state.p2Blanks.findIndex(b => b === null);
            if (emptyIdx !== -1) {
                state.p2Blanks[emptyIdx] = w;
                render();
            }
        }

        function returnWord(idx) {
            if(state.p2Blanks[idx]) {
                state.p2Blanks[idx] = null;
                render();
            }
        }

        function checkPart2() {
            if(state.p2Blanks.includes(null)) {
                showModal("請注意", "還有空格沒有填完喔！");
                return;
            }

            let article = part2Data[state.part2Index];
            let allCorrect = true;
            let wrongIndices = [];

            for(let i=0; i<10; i++) {
                if(state.p2Blanks[i] !== article.words[i]) {
                    allCorrect = false;
                    wrongIndices.push(i);
                }
            }

            if(allCorrect) {
                state.part2Index++;
                if(state.part2Index >= part2Data.length) {
                    showModal("太棒了！", "第二大題全部完成，準備進入第三大題！", startStage3);
                } else {
                    showModal("正確！", "準備進入下一篇文章。", initPart2Article);
                }
            } else {
                let resetTriggered = loseLife("第二大題", startStage2);
                if(!resetTriggered) {
                    wrongIndices.forEach(idx => {
                        state.p2Blanks[idx] = null;
                    });
                    showModal("有錯誤喔！", "答錯的生詞已經自動退回生詞庫，請再試試看！");
                    render();
                }
            }
        }

        function startStage3() {
            state.stage = 3;
            state.part3GrammarIndex = 0;
            initPart3Grammar();
        }

        function initPart3Grammar() {
            state.lives = 6;
            state.part3QuestionIndex = 0;
            initPart3Question();
        }

        function initPart3Question() {
            state.part3Mistakes = 0;
            let q = part3Data[state.part3GrammarIndex].qs[state.part3QuestionIndex];
            state.p3Pool = shuffle([...q.fragments]);
            state.p3Answer = [];
            render();
        }

        function p3MoveToAns(idx) {
            let frag = state.p3Pool.splice(idx, 1)[0];
            state.p3Answer.push(frag);
            render();
        }

        function p3MoveToPool(idx) {
            let frag = state.p3Answer.splice(idx, 1)[0];
            state.p3Pool.push(frag);
            render();
        }

        function checkPart3() {
            if(state.p3Pool.length > 0) {
                showModal("請注意", "請把所有的詞塊都排入句子中！");
                return;
            }

            let q = part3Data[state.part3GrammarIndex].qs[state.part3QuestionIndex];
            let userAns = state.p3Answer.join("");

            if(userAns === q.correctText) {
                state.part3QuestionIndex++;
                let qLength = part3Data[state.part3GrammarIndex].qs.length;
                
                if(state.part3QuestionIndex >= qLength) {
                    state.part3GrammarIndex++;
                    if(state.part3GrammarIndex >= part3Data.length) {
                        state.stage = 4;
                        render();
                    } else {
                        let nextGrammar = part3Data[state.part3GrammarIndex].grammar;
                        showModal("恭喜！", `這個語法完成了！<br><br>接下來進入語法：<b>${nextGrammar}</b><br><br>生命值已重置為 6 個拼圖！`, initPart3Grammar);
                    }
                } else {
                    initPart3Question();
                }
            } else {
                state.part3Mistakes++;
                let currentGrammarName = part3Data[state.part3GrammarIndex].grammar;
                let resetTriggered = loseLife(`目前語法 (${currentGrammarName})`, initPart3Grammar);
                
                if(!resetTriggered) {
                    if (state.part3Mistakes >= 3) {
                        showModal("錯太多次囉！", `別灰心，正確答案是：<br><br><b class="text-m-primary text-lg">${q.correctText}</b><br><br>請記住這句話，重新把詞塊正確排進去吧！`, () => {
                            state.p3Pool = state.p3Pool.concat(state.p3Answer);
                            state.p3Answer = [];
                            render();
                        });
                    } else {
                        state.p3Pool = state.p3Pool.concat(state.p3Answer);
                        state.p3Answer = [];
                        
                        let hints = [
                            "請注意詞塊之間的邏輯順序喔！",
                            "可以先找出句子的主詞和動詞。",
                            "仔細看這個語法的結構是怎麼使用的。"
                        ];
                        let hintText = hints[Math.floor(Math.random() * hints.length)];
                        
                        showModal("順序不對喔！", `${hintText}<br><br>詞塊已經退回，請重新排列。`);
                        render();
                    }
                }
            }
        }

        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
